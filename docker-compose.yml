version: "3.9"

services:

  # ── Qdrant vector database ──────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: musing_greider
    ports:
      - "6333:6333"       # REST API 
      - "6334:6334"       # gRPC API means for internal communication, not exposed to host
    volumes:
      - ./qdrant_storage:/qdrant/storage   # persist vectors on disk
    restart: unless-stopped

  # ── FastAPI app ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: contract_api
    ports:
      - "8000:8000"
    env_file:
      - .env                               # loads GROQ_API_KEY, API_KEY, etc.
    environment:
      - QDRANT_HOST=qdrant                 # ← use service name, not localhost
      - QDRANT_PORT=6333
    depends_on:
      - qdrant                             # wait for Qdrant before starting
    restart: unless-stopped

volumes:
  qdrant_storage: